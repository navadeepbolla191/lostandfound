<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FindIt | Institutional Lost &amp; Found</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="background-orb orb-a"></div>
    <div class="background-orb orb-b"></div>
    <div class="background-grid"></div>

    <div id="app"></div>

    <template id="auth-template">
      <main class="shell auth-shell">
        <section class="hero-panel">
          <div class="eyebrow">Smart institutional recovery system</div>
          <h1>FindIt keeps lost items from disappearing into campus chaos.</h1>
          <p class="hero-copy">
            Structured reports, image-backed matching, and admin-verified
            handovers for colleges, universities, and corporate campuses.
          </p>
          <div class="hero-highlights">
            <article class="glass-tile">
              <span class="tile-label">Matching Engine</span>
              <strong>Compares location, category, time, and photo signals</strong>
            </article>
            <article class="glass-tile">
              <span class="tile-label">Secure Access</span>
              <strong>Institutional email only with role-based dashboards</strong>
            </article>
            <article class="glass-tile">
              <span class="tile-label">Verified Return</span>
              <strong>Admins confirm identity before physical handover</strong>
            </article>
          </div>
        </section>

        <section class="auth-card card">
          <div class="auth-toggle">
            <button class="toggle-button is-active" data-mode="login">Sign In</button>
            <button class="toggle-button" data-mode="register">Register</button>
          </div>

          <div class="demo-strip">
            <div>
              <span>Student demo</span>
              <strong>demo@cvr.ac.in / password</strong>
            </div>
            <div>
              <span>Admin demo</span>
              <strong>admin@cvr.ac.in / password</strong>
            </div>
          </div>

          <form id="auth-form" class="auth-form">
            <div class="field-group register-only hidden">
              <label for="name">Full name</label>
              <input id="name" name="name" type="text" placeholder="Aarav Menon" />
            </div>

            <div class="field-group">
              <label for="email">Institutional email</label>
              <input
                id="email"
                name="email"
                type="email"
                placeholder="name@cvr.ac.in"
                required
              />
            </div>

            <div class="field-group">
              <label for="password">Password</label>
              <input
                id="password"
                name="password"
                type="password"
                minlength="8"
                placeholder="Minimum 8 characters"
                required
              />
            </div>

            <div class="field-group register-only hidden">
              <label for="role">Account type</label>
              <select id="role" name="role">
                <option value="user">Standard user</option>
                <option value="admin">Administrator</option>
              </select>
            </div>

            <button class="primary-button" type="submit">Access FindIt</button>
            <p id="auth-message" class="inline-message"></p>
          </form>
        </section>
      </main>
    </template>

    <template id="dashboard-template">
      <main class="shell dashboard-shell">
        <header class="topbar card">
          <div>
            <div class="eyebrow">Institutional lost &amp; found</div>
            <h2>FindIt Command Center</h2>
          </div>
          <div class="topbar-actions">
            <div class="user-badge">
              <span id="user-role-badge"></span>
              <strong id="user-name"></strong>
              <small id="user-email"></small>
            </div>
            <button id="logout-button" class="ghost-button">Log Out</button>
          </div>
        </header>

        <section class="overview-grid">
          <article class="metric-card card">
            <span>Active reports</span>
            <strong id="metric-active">0</strong>
            <small>Items currently being tracked</small>
          </article>
          <article class="metric-card card">
            <span>Potential matches</span>
            <strong id="metric-matches">0</strong>
            <small>Awaiting admin review</small>
          </article>
          <article class="metric-card card">
            <span>Verified handovers</span>
            <strong id="metric-returned">0</strong>
            <small>Secure returns completed</small>
          </article>
          <article class="metric-card card">
            <span>Confidence leader</span>
            <strong id="metric-confidence">0%</strong>
            <small>Highest current match score</small>
          </article>
        </section>

        <section class="workspace-grid">
          <section class="panel card">
            <div class="panel-heading">
              <div>
                <div class="eyebrow">Report item</div>
                <h3>4-step recovery workflow</h3>
              </div>
              <span class="wizard-step" id="wizard-step-label">Step 1 of 4</span>
            </div>

            <form id="report-form" class="wizard-form">
              <div class="wizard-pane" data-step="1">
                <div class="type-selector">
                  <button type="button" class="type-card is-selected" data-type="lost">
                    <span>Lost item</span>
                    <strong>I need help finding something</strong>
                  </button>
                  <button type="button" class="type-card" data-type="found">
                    <span>Found item</span>
                    <strong>I located something and want to report it</strong>
                  </button>
                </div>
              </div>

              <div class="wizard-pane hidden" data-step="2">
                <div class="field-grid">
                  <div class="field-group">
                    <label for="item-name">Item name</label>
                    <input id="item-name" name="itemName" type="text" required />
                  </div>
                  <div class="field-group">
                    <label for="category">Category</label>
                    <select id="category" name="category" required>
                      <option value="">Select category</option>
                      <option>Electronics</option>
                      <option>Keys</option>
                      <option>Bags</option>
                      <option>Documents</option>
                      <option>Clothing</option>
                      <option>Accessories</option>
                      <option>Other</option>
                    </select>
                  </div>
                  <div class="field-group">
                    <label for="location">Location</label>
                    <input
                      id="location"
                      name="location"
                      type="text"
                      placeholder="Library Level 2"
                      required
                    />
                  </div>
                  <div class="field-group">
                    <label for="date">Date</label>
                    <input id="date" name="date" type="date" required />
                  </div>
                </div>
                <div class="field-group">
                  <label for="description">Description</label>
                  <textarea
                    id="description"
                    name="description"
                    rows="4"
                    placeholder="Brand, color, scratches, keychains, labels, or any unique markers"
                    required
                  ></textarea>
                </div>
              </div>

              <div class="wizard-pane hidden" data-step="3">
                <div class="upload-panel">
                  <label class="upload-box" for="photo">
                    <input id="photo" name="photo" type="file" accept="image/*" required />
                    <span>Upload a clear photo</span>
                    <small>Used for visual fingerprinting and admin side-by-side comparison</small>
                  </label>
                  <div class="preview-card hidden" id="preview-card">
                    <img id="preview-image" alt="Item preview" />
                  </div>
                </div>
              </div>

              <div class="wizard-pane hidden" data-step="4">
                <div id="review-panel" class="review-panel"></div>
              </div>

              <div class="wizard-actions">
                <button id="back-button" class="ghost-button hidden" type="button">Back</button>
                <button id="next-button" class="primary-button" type="button">Continue</button>
                <button id="submit-button" class="primary-button hidden" type="submit">
                  Submit Report
                </button>
              </div>
              <p id="report-message" class="inline-message"></p>
            </form>
          </section>

          <section class="panel card">
            <div class="panel-heading">
              <div>
                <div class="eyebrow">Tracking</div>
                <h3 id="reports-title">My reports</h3>
              </div>
              <select id="status-filter" class="compact-select">
                <option value="all">All statuses</option>
                <option value="Pending">Pending</option>
                <option value="Matched">Matched</option>
                <option value="Verified">Verified</option>
                <option value="Returned">Returned</option>
              </select>
            </div>
            <div id="reports-list" class="stack-list"></div>
          </section>
        </section>

        <section id="admin-panel" class="admin-panel hidden">
          <div class="admin-grid">
            <section class="panel card">
              <div class="panel-heading">
                <div>
                  <div class="eyebrow">Admin review</div>
                  <h3>Pending match queue</h3>
                </div>
              </div>
              <div id="matches-list" class="stack-list"></div>
            </section>

            <section class="panel card">
              <div class="panel-heading">
                <div>
                  <div class="eyebrow">Operations</div>
                  <h3>All reports master table</h3>
                </div>
                <input
                  id="admin-search"
                  class="search-input"
                  type="search"
                  placeholder="Search item, user, location..."
                />
              </div>
              <div id="admin-table" class="table-wrap"></div>
            </section>
          </div>
        </section>
      </main>
    </template>

    <script src="./app.js"></script>
  </body>
</html>
